name: DeuteriumCoin Windows Build

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build-windows:
    name: Build Windows (cross-compile)
    runs-on: ubuntu-20.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          submodules: recursive

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            autoconf \
            automake \
            libtool \
            pkg-config \
            build-essential \
            cmake \
            curl \
            git \
            python3 \
            g++-mingw-w64-x86-64 \
            mingw-w64 \
            mingw-w64-tools \
            nsis

      - name: Build depends for Windows
        run: |
          cd depends
          make HOST=x86_64-w64-mingw32 -j$(nproc)

      - name: Run autogen
        run: ./autogen.sh

      - name: Configure for Windows
        run: |
          CONFIG_SITE=$PWD/depends/x86_64-w64-mingw32/share/config.site \
          ./configure \
            --prefix=/ \
            --disable-tests \
            --disable-bench \
            --without-gui \
            HOST=x86_64-w64-mingw32

      - name: Build
        run: make -j$(nproc)

      - name: Upload Windows binaries
        uses: actions/upload-artifact@v3
        with:
          name: deuteriumcoin-windows
          path: |
            src/deuteriumcoind.exe
            src/deuteriumcoin-cli.exe
            src/deuteriumcoin-tx.exe
          if-no-files-found: warn
